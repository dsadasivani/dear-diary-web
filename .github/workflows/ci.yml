name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - run: npm run backend:test

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test:v2-client
      - run: npm run test:storage
      - run: npm run test:component
      - run: npm run test:server
      - run: npm run build
      - run: npm run scan:secrets
      - run: npm run test:ops
      - run: npm audit --audit-level=high

  supabase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:supabase

  browser:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
      options: --ipc=host
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:e2e
        env:
          HOME: /root
      - run: npm run test:accessibility
        env:
          HOME: /root

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run build
      - run: npx cap sync android
      - run: npm run android:test
      - run: npm run android:lint

  required:
    name: CI passed
    if: always()
    needs: [backend, web, supabase, browser, android]
    runs-on: ubuntu-latest
    steps:
      - name: Require every CI job to pass
        env:
          BACKEND_RESULT: ${{ needs.backend.result }}
          WEB_RESULT: ${{ needs.web.result }}
          SUPABASE_RESULT: ${{ needs.supabase.result }}
          BROWSER_RESULT: ${{ needs.browser.result }}
          ANDROID_RESULT: ${{ needs.android.result }}
        shell: bash
        run: |
          set -euo pipefail
          for result in \
            "$BACKEND_RESULT" \
            "$WEB_RESULT" \
            "$SUPABASE_RESULT" \
            "$BROWSER_RESULT" \
            "$ANDROID_RESULT"; do
            if [[ "$result" != "success" ]]; then
              echo "A required CI job ended with result: $result" >&2
              exit 1
            fi
          done
