spring:
  application:
    name: dear-diary-sync-api
  datasource:
    url: ${SYNC_DB_URL:jdbc:postgresql://localhost:5432/dear_diary_sync}
    username: ${SYNC_DB_USERNAME:dear_diary_sync}
    password: ${SYNC_DB_PASSWORD:}
    hikari:
      maximum-pool-size: ${SYNC_DB_MAX_POOL_SIZE:10}
      minimum-idle: ${SYNC_DB_MIN_IDLE:1}
      connection-timeout: ${SYNC_DB_CONNECTION_TIMEOUT_MS:5000}
  flyway:
    enabled: true
    validate-migration-naming: true
  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  shutdown: graceful
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "

sync:
  object-store:
    enabled: ${SYNC_OBJECT_STORE_ENABLED:false}
    bucket: ${SYNC_OBJECT_STORE_BUCKET:disabled}
    region: ${SYNC_OBJECT_STORE_REGION:us-east-1}
    endpoint: ${SYNC_OBJECT_STORE_ENDPOINT:}
    path-style-access: ${SYNC_OBJECT_STORE_PATH_STYLE:false}
    signed-url-ttl: ${SYNC_OBJECT_STORE_SIGNED_URL_TTL:5m}
    api-call-timeout: ${SYNC_OBJECT_STORE_API_TIMEOUT:10s}
    api-call-attempt-timeout: ${SYNC_OBJECT_STORE_ATTEMPT_TIMEOUT:5s}
  security:
    jwt:
      enabled: ${SYNC_JWT_ENABLED:false}
      issuer-uri: ${SYNC_JWT_ISSUER_URI:disabled}
      jwk-set-uri: ${SYNC_JWT_JWK_SET_URI:}
      audience: ${SYNC_JWT_AUDIENCE:}
