spring:
  datasource:
    url: ${SYNC_DB_URL:jdbc:postgresql://localhost:5432/dear_diary_sync}
    username: ${SYNC_DB_USERNAME:dear_diary_sync}
    password: ${SYNC_DB_PASSWORD:}
    hikari:
      maximum-pool-size: ${SYNC_DB_MAX_POOL_SIZE:3}
      minimum-idle: ${SYNC_DB_MIN_IDLE:0}

management:
  tracing:
    enabled: ${SYNC_TRACING_ENABLED:false}

sync:
  cors:
    allowed-origins: ${SYNC_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,https://localhost,capacitor://localhost}
  object-store:
    enabled: ${SYNC_OBJECT_STORE_ENABLED:false}
    bucket: ${SYNC_OBJECT_STORE_BUCKET:dear-diary-sync}
    region: ${SYNC_OBJECT_STORE_REGION:us-east-1}
    endpoint: ${SYNC_OBJECT_STORE_ENDPOINT:}
    path-style-access: ${SYNC_OBJECT_STORE_PATH_STYLE:true}
  security:
    jwt:
      enabled: ${SYNC_JWT_ENABLED:false}
  notification:
    publisher:
      enabled: ${SYNC_NOTIFICATION_PUBLISHER_ENABLED:false}
    worker:
      enabled: ${SYNC_NOTIFICATION_WORKER_ENABLED:false}
  garbage-collection:
    enabled: ${SYNC_GC_WORKER_ENABLED:false}
    dry-run: ${SYNC_GC_DRY_RUN:true}
