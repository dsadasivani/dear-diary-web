services:
  postgres:
    image: postgres:16.9-alpine
    container_name: dear-diary-sync-postgres
    environment:
      POSTGRES_DB: dear_diary_sync
      POSTGRES_USER: dear_diary_sync
      POSTGRES_PASSWORD: dear_diary_local
    ports:
      - "5432:5432"
    volumes:
      - dear-diary-sync-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dear_diary_sync -d dear_diary_sync"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: dear-diary-sync-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dear_diary_local
      MINIO_ROOT_PASSWORD: dear_diary_local_secret
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:3000,http://127.0.0.1:3000,https://localhost,capacitor://localhost"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - dear-diary-sync-minio:/data

  minio-setup:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 dear_diary_local dear_diary_local_secret; do sleep 2; done;
      mc mb --ignore-existing local/dear-diary-sync;
      "

volumes:
  dear-diary-sync-postgres:
  dear-diary-sync-minio:
